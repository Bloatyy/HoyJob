<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox – HoyJob</title>
  <!-- Premium Font Stack -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/chat.css">
</head>
<body>

<nav class="site-nav"></nav>

<div class="dash-layout">
  <!-- PANE 1: Sidebar Menu (Role-aware) -->
  <aside class="dash-sidebar" id="main-sidebar">
    <!-- Populated by JS for Agent/Recruiter consistency -->
  </aside>

  <!-- Main Content Wrapper -->
  <main class="dash-main" style="padding: 0; background: var(--chat-bg);">
    <div class="chat-wrapper">
      <div class="chat-container">
        
        <!-- PANE 2: Conversation List -->
        <aside class="chat-contacts">
          <div class="contacts-header">
            <h2>Messages</h2>
            <div class="search-contacts-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="search-conversations" placeholder="Search conversations...">
            </div>
          </div>
          
          <div class="contacts-list">
            <!-- Populated by chat.js -->
          </div>
        </aside>

        <!-- PANE 3: Active Chat Window -->
        <section class="chat-main-view">
          <!-- Chat Header -->
          <div class="chat-header-view">
            <div class="chat-user-info" style="display:flex; align-items:center; gap:0.75rem;">
              <div class="avatar-wrapper">
                <div class="avatar" style="background:#000; color:#EFFF00; width:40px; height:40px; font-weight:700;">?</div>
              </div>
              <div class="chat-user-meta">
                <h3>Communication Hub</h3>
                <span class="status-text">Select a secure channel to begin</span>
              </div>
            </div>
          </div>

          <!-- Messages Area -->
          <div class="messages-scroller">
            <!-- Populated by chat.js -->
          </div>

          <!-- Floating Input Area -->
          <div class="input-dock">
            <div class="floating-input">
              <button class="icon-trigger" id="attachment-trigger">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
              </button>
              <input type="file" id="photo-upload" accept="image/*" style="display: none;">
              <input type="text" placeholder="Write a message...">
              <div class="input-actions">
                <button class="send-trigger">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
              </div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </main>
</div>

<script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
<script src="../js/global.js"></script>
<script src="../js/chat.js"></script>
<script>
  // Dynamic Side-Nav
  document.addEventListener('DOMContentLoaded', () => {
    const userRole = localStorage.getItem('hj_user') ? JSON.parse(localStorage.getItem('hj_user')).role : 'agent';
    const sidebar = document.getElementById('main-sidebar');
    if (userRole === 'recruiter') {
      sidebar.innerHTML = `
        <div class="sidebar-title">Management</div>
        <a href="recruiter-dashboard.html"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span> Console</a>
        <a href="post-job.html"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></span> Create Job</a>
        <a href="jobs.html"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span> Talent Pool</a>
        <a href="chat.html" class="active"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></span> Messages</a>
      `;
    } else {
      sidebar.innerHTML = `
        <div class="sidebar-title">Main</div>
        <a href="agent-dashboard.html"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span> Overview</a>
        <a href="jobs.html"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></span> Marketplace</a>
        <a href="chat.html" class="active"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></span> Messages</a>
        <div class="sidebar-title" style="margin-top:2rem;">Account</div>
        <a href="profile.html"><span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span> Profile</a>
      `;
    }
  });
</script>
</body>
</html>
